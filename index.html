          if (match) {
            setProjecten(prev => prev.map(p => p.id === match.id ? { ...p, brDossierNr: nr, brRapportId: bewerkRapport } : p));
          }
        };
        const maakPdf = async () => {
          updateRap(r => ({ ...r, pdf: true }));
          if (!rap.gekoppeld) koppelAanProject();
          // Build PDF using canvas
          const W = 595; const H = 842; // A4
          const pages = [];
          let canvas = document.createElement("canvas"); canvas.width = W; canvas.height = H;
          let ctx = canvas.getContext("2d");
          let y = 40;
          const newPage = () => { pages.push(canvas.toDataURL("image/jpeg", 0.92)); canvas = document.createElement("canvas"); canvas.width = W; canvas.height = H; ctx = canvas.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,W,H); y = 40; };
          ctx.fillStyle = "#fff"; ctx.fillRect(0,0,W,H);
          // Header
          ctx.fillStyle = "#8B5CF6"; ctx.fillRect(0, 0, W, 70);
          ctx.fillStyle = "#fff"; ctx.font = "bold 20px sans-serif"; ctx.fillText("BEZOEKRAPPORT", 24, 35);
          ctx.font = "14px sans-serif"; ctx.fillText(rap.klant || "", 24, 55);
          ctx.fillStyle = "#1e293b"; y = 85;
          ctx.font = "11px sans-serif"; ctx.fillText("Adres: " + (rap.adres || ""), 24, y); y += 16;
          ctx.fillText("Dossiernr: " + (rap.dossierNr || "-") + "   |   Datum: " + (rap.ontvangen || ""), 24, y); y += 24;
          // Types
          for (const [tk, td] of Object.entries(rap.types || {})) {
            if (y > H - 80) newPage();
            ctx.fillStyle = td.completed ? "#22C55E" : "#F59E0B"; ctx.fillRect(24, y, W-48, 24); ctx.globalAlpha = 0.12; ctx.fillRect(24, y, W-48, 24); ctx.globalAlpha = 1;
            ctx.fillStyle = "#1e293b"; ctx.font = "bold 12px sans-serif"; ctx.fillText(td.label + (td.completed ? "  \u2713" : ""), 32, y + 16);
            ctx.font = "10px sans-serif"; ctx.fillStyle = "#64748b";
            ctx.fillText("Foto: " + td.photo + "%  |  Info: " + td.info + "%", W - 180, y + 16);
            y += 32;
            for (const item of (td.items || [])) {
              if (y > H - 60) newPage();
              const filled = item.notes || item._photoCount > 0 || item.parking || item.phaseType;
              ctx.fillStyle = filled ? "#22C55E" : "#D1D5DB"; ctx.font = "10px sans-serif";
              ctx.fillText(filled ? "\u2713" : "\u25CB", 32, y + 3);
              ctx.fillStyle = "#1e293b"; ctx.font = "11px sans-serif"; ctx.fillText(item.label, 48, y + 3);
              y += 16;
              // Fields
              const fields = [];
              if (item.parking) fields.push("Parking: " + item.parking);
              if (item.phaseType) fields.push("Fase: " + item.phaseType);
              if (item.unitType) fields.push("Unit: " + item.unitType);
              if (item.fixType) fields.push("Bevestiging: " + item.fixType);
              if (item.connType) fields.push("Aansluiting: " + item.connType);
              if (item.mountType) fields.push("Montage: " + item.mountType);
              if (item.locationType) fields.push("Locatie: " + item.locationType);
              if (item.panelCount) fields.push("Panelen: " + item.panelCount);
              if (item.fuelType) fields.push("Brandstof: " + item.fuelType);
              if (item.location) fields.push("Locatie: " + item.location);
              if (fields.length) {
                if (y > H - 40) newPage();
                ctx.fillStyle = "#64748b"; ctx.font = "9px sans-serif"; ctx.fillText(fields.join("  |  "), 48, y + 3); y += 14;
              }
              if (item.notes) {
                if (y > H - 40) newPage();
                ctx.fillStyle = "#8B5CF6"; ctx.fillRect(48, y-2, 2, 12);
                ctx.fillStyle = "#475569"; ctx.font = "9px sans-serif";
                const noteTxt = item.notes.substring(0, 100) + (item.notes.length > 100 ? "..." : "");
                ctx.fillText(noteTxt, 56, y + 8); y += 16;
              }
              // Photos
              const itemPhotos = ((rap.items || {})[tk + "_" + item.key] || {}).photos || [];
              if (itemPhotos.length > 0) {
                let px = 48;
                for (const photo of itemPhotos) {
                  if (y > H - 110) newPage();
                  try {
                    const img = new Image(); img.src = photo;
                    await new Promise((res) => { img.onload = res; img.onerror = res; });
                    if (img.width > 0) {
                      const pw = 120; const ph = 90;
                      if (px + pw > W - 24) { px = 48; y += ph + 6; }
                      if (y + ph > H - 30) newPage();
                      ctx.drawImage(img, px, y, pw, ph);
                      ctx.strokeStyle = "#e2e8f4"; ctx.lineWidth = 1; ctx.strokeRect(px, y, pw, ph);
                      px += pw + 6;
                    }
                  } catch(e) {}
                }
                y += 96;
              }
              y += 4;
            }
            y += 10;
          }
          pages.push(canvas.toDataURL("image/jpeg", 0.92));
          // Convert pages to PDF using jsPDF-like approach (simple PDF builder)
          // Actually let's download all pages as images in a single HTML file that can be printed as PDF
          const printHtml = "<!DOCTYPE html><html><head><style>@page{margin:0}body{margin:0}img{width:100%;page-break-after:always}</style></head><body>" +
            pages.map(p => '<img src="' + p + '"/>').join("") + "</body></html>";
          const blob = new Blob([printHtml], { type: "text/html" });
          const url = URL.createObjectURL(blob);
          const w = window.open(url, "_blank");
          if (w) { setTimeout(() => { try { w.print(); } catch(e) {} }, 500); }
        };
        const typeEntries = Object.entries(rap.types || {});

        return (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Header */}
            <div style={{ padding: "12px 24px", borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, background: T.bg2 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span onClick={() => setBewerkRapport(null)} style={{ cursor: "pointer", fontSize: 18, color: T.text4, padding: "4px 8px", borderRadius: 6 }}
                  onMouseEnter={e => e.currentTarget.style.background = T.border2}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>{String.fromCodePoint(0x2190)}</span>
                <div>
                  <input value={rap.klant} onChange={e => updateRap(r => ({ ...r, klant: e.target.value }))}
                    style={{ fontSize: 15, fontWeight: 700, color: T.text2, border: "none", background: "transparent", padding: 0, outline: "none", width: 280 }} />
                  <input value={rap.adres} onChange={e => updateRap(r => ({ ...r, adres: e.target.value }))}
                    style={{ display: "block", fontSize: 11, color: T.text4, border: "none", background: "transparent", padding: 0, outline: "none", width: 350, marginTop: 2 }} />
                </div>
                {rap.dossierNr && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: "#6366F115", color: "#6366F1", fontFamily: "monospace", fontWeight: 700 }}>{rap.dossierNr}</span>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {!rap.gekoppeld && <button onClick={koppelAanProject} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${T.accent}`, background: "transparent", color: T.accent, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Koppelen</button>}
                {rap.firebaseId && window.fbDb && <button onClick={saveToFirebase} style={{ padding: "7px 14px", borderRadius: 6, border: "none", background: "#22C55E", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{String.fromCodePoint(0x1F4BE)} Opslaan</button>}
                <button onClick={maakPdf} style={{ padding: "7px 14px", borderRadius: 6, border: "none", background: "#8B5CF6", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                  {String.fromCodePoint(0x1F4C4)} PDF
                </button>
                <button onClick={() => { if(confirm("Verwijderen?")) { setBrRapporten(prev => { const n={...prev}; delete n[bewerkRapport]; return n; }); setBewerkRapport(null); } }}
                  style={{ padding: "7px 14px", borderRadius: 6, border: "1px solid #DC2626", background: "transparent", color: "#DC2626", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                  {String.fromCodePoint(0x1F5D1)}
                </button>
              </div>
            </div>
            {/* Body */}
            <div style={{ flex: 1, overflow: "auto", padding: 20 }}>
              {typeEntries.map(([typeKey, typeData]) => (
                <div key={typeKey} style={{ marginBottom: 18, background: T.bg2, borderRadius: 10, border: `1px solid ${typeData.completed ? "#22C55E30" : T.border}`, overflow: "hidden" }}>
                  <div style={{ padding: "12px 16px", background: typeData.completed ? "#22C55E08" : T.bg3, borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      {typeData.completed && <span style={{ color: "#22C55E" }}>{String.fromCodePoint(0x2713)}</span>}
                      <span style={{ fontSize: 13, fontWeight: 700, color: T.text2 }}>{typeData.label}</span>
                      <span style={{ fontSize: 9, color: T.text5 }}>{String.fromCodePoint(0x1F4F7)} {typeData.photo}% {String.fromCodePoint(0x1F4CB)} {typeData.info}%</span>
                    </div>
                  </div>
                  <div style={{ padding: "8px 12px", display: "flex", flexDirection: "column", gap: 0 }}>
                    {(typeData.items || []).map((item, idx) => {
                      const fullKey = typeKey + "_" + item.key;
                      const storedItem = (rap.items || {})[fullKey] || {};
                      const photos = item.storageUrls && item.storageUrls.length > 0 ? item.storageUrls : (storedItem.storageUrls || storedItem.photos || []);
                      const filled = item._checked || item.notes || item._photoCount > 0 || item.parking || item.phaseType || item.unitType || item.fixType;
                      const hasFields = item.parking || item.phaseType || item.unitType || item.fixType || item.connType || item.mountType || item.locationType || item.panelCount || item.fuelType || item.location || item.condensStatus || item.elekStatus;
                      const toggleChecked = () => {
                        updateRap(r => {
                          const types = { ...r.types };
                          const items = [...(types[typeKey]?.items || [])];
                          items[idx] = { ...items[idx], _checked: !items[idx]._checked };
                          types[typeKey] = { ...types[typeKey], items };
                          return { ...r, types };
                        });
                      };
                      return (
                        <div key={idx} style={{ padding: "10px 8px", borderBottom: idx < (typeData.items||[]).length-1 ? `1px solid ${T.border}` : "none" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                            <span onClick={toggleChecked} style={{ width: 18, height: 18, borderRadius: 4, background: filled ? "#22C55E15" : T.border2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: filled ? "#22C55E" : "#ccc", flexShrink: 0, border: `1px solid ${filled ? "#22C55E40" : T.border}`, cursor: "pointer" }}>
                              {filled ? String.fromCodePoint(0x2713) : ""}
                            </span>
                            <span style={{ fontSize: 12, fontWeight: 600, color: T.text2 }}>{item.label}</span>
                            {item._photoCount > 0 && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 3, background: "#3B82F610", color: "#3B82F6", fontWeight: 600 }}>{String.fromCodePoint(0x1F4F7)} {item._photoCount}</span>}
                          </div>
                          {/* Notities */}
                          {item.notes && (
                            <div style={{ marginLeft: 26, marginBottom: 4 }}>
                              <textarea value={item.notes}
                                onChange={e => {
                                  const val = e.target.value;
                                  updateRap(r => {
                                    const types = { ...r.types };
                                    const items = [...(types[typeKey]?.items || [])];
                                    items[idx] = { ...items[idx], notes: val };
                                    types[typeKey] = { ...types[typeKey], items };
                                    return { ...r, types };
                                  });
                                }}
                                rows={Math.min(4, Math.ceil(item.notes.length / 60))}
                                style={{ width: "100%", fontSize: 11, color: T.text3, border: `1px solid ${T.border}`, borderRadius: 6, padding: "6px 8px", background: T.input, outline: "none", resize: "vertical", fontFamily: "inherit", lineHeight: 1.4 }} />
                            </div>
                          )}
                          {!item.notes && (
                            <div style={{ marginLeft: 26, marginBottom: 4 }}>
                              <input placeholder="Notitie toevoegen..."
                                onBlur={e => {
                                  if (!e.target.value.trim()) return;
                                  const val = e.target.value;
                                  updateRap(r => {
                                    const types = { ...r.types };
                                    const items = [...(types[typeKey]?.items || [])];
                                    items[idx] = { ...items[idx], notes: val };
                                    types[typeKey] = { ...types[typeKey], items };
                                    return { ...r, types };
                                  });
                                }}
                                style={{ width: "100%", fontSize: 10, color: T.text5, border: `1px dashed ${T.border}`, borderRadius: 4, padding: "4px 8px", background: "transparent", outline: "none", fontFamily: "inherit" }} />
                            </div>
                          )}
                          {/* Bewerkbare velden */}
                          {(() => {
                            const fieldKeys = (BR_TYPE_FIELDS[typeKey] || {})[item.key] || [];
                            if (fieldKeys.length === 0) return null;
                            const setField = (fieldName, val) => {
                              updateRap(r => {
                                const types = { ...r.types };
                                const items = [...(types[typeKey]?.items || [])];
                                items[idx] = { ...items[idx], [fieldName]: items[idx][fieldName] === val ? null : val };
                                types[typeKey] = { ...types[typeKey], items };
                                return { ...r, types };
                              });
                            };
                            return (
                              <div style={{ marginLeft: 26, marginBottom: 6 }}>
                                {fieldKeys.map(fk => {
                                  const def = BR_FIELD_OPTIONS[fk];
                                  if (!def) return null;
                                  const cur = item[fk];
                                  if (def.input === "number") {
                                    return (
                                      <div key={fk} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                                        <span style={{ fontSize: 10, color: def.color, fontWeight: 600, minWidth: 70 }}>{def.label}</span>
                                        <input type="number" value={cur || ""} onChange={e => {
                                          const v = e.target.value;
                                          updateRap(r => {
                                            const types = { ...r.types };
                                            const items = [...(types[typeKey]?.items || [])];
                                            items[idx] = { ...items[idx], [fk]: v };
                                            types[typeKey] = { ...types[typeKey], items };
                                            return { ...r, types };
                                          });
                                        }} style={{ width: 70, fontSize: 11, padding: "3px 6px", borderRadius: 4, border: `1px solid ${def.color}40`, background: `${def.color}08`, outline: "none", fontFamily: "inherit" }} />
                                      </div>
                                    );
                                  }
                                  return (
                                    <div key={fk} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                                      <span style={{ fontSize: 10, color: def.color, fontWeight: 600, minWidth: 70 }}>{def.label}</span>
                                      <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                                        {def.options.map(([val, lbl]) => {
                                          const active = cur === val;
                                          return (
                                            <button key={val} onClick={() => setField(fk, val)} style={{
                                              fontSize: 10, padding: "3px 10px", borderRadius: 5,
                                              border: `1px solid ${active ? def.color : "#E2E8F0"}`,
                                              background: active ? `${def.color}18` : "transparent",
                                              color: active ? def.color : "#64748B",
                                              fontWeight: active ? 700 : 500,
                                              cursor: "pointer", fontFamily: "inherit",
                                              transition: "all .15s"
                                            }}>{lbl}</button>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            );
                          })()}
                          {/* Foto's */}
                          {photos.length > 0 && (
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginLeft: 26, marginTop: 4 }}>
                              {photos.map((p, pi) => (
                                <div key={pi} style={{ position: "relative", cursor: "pointer" }}
                                  onClick={() => setFotoEditor({ rapId: bewerkRapport, fullKey, photos: Object.assign([...photos], { _startIdx: pi }) })}>
                                  <img src={p} style={{ width: 140, height: 105, objectFit: "cover", borderRadius: 6, border: `2px solid ${T.border}`, display: "block" }} />
                                  <div style={{ position: "absolute", bottom: 4, right: 4, background: "rgba(0,0,0,.6)", borderRadius: 4, padding: "2px 6px", display: "flex", alignItems: "center", gap: 3 }}>
                                    <span style={{ fontSize: 9, color: "#fff" }}>{String.fromCodePoint(0x270F)} Bewerken</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Foto Editor Overlay */}
      {fotoEditor && (
        <FotoEditor
          photos={fotoEditor.photos}
          T={T}
          onSave={(newPhotos, action) => {
            if (action && action.action === "move") return;
            const rapId = fotoEditor.rapId;
            const fullKey = fotoEditor.fullKey;
            setBrRapporten(prev => {
              const rap = { ...prev[rapId] };
              // Update rap.items
              const items = { ...rap.items };
              if (items[fullKey]) {
                items[fullKey] = { ...items[fullKey], photos: newPhotos, storageUrls: newPhotos, _photoCount: newPhotos.length };
              } else {
                items[fullKey] = { photos: newPhotos, storageUrls: newPhotos, _photoCount: newPhotos.length };
              }
              // Also update rap.types items storageUrls
              const types = { ...rap.types };
              const parts = fullKey.split("_");
              const typeKey = parts[0];
              const itemKey = parts.slice(1).join("_");
              if (types[typeKey]) {
                const typeItems = [...(types[typeKey].items || [])];
                const ii = typeItems.findIndex(it => it.key === itemKey);
                if (ii >= 0) {
                  typeItems[ii] = { ...typeItems[ii], storageUrls: newPhotos, _photoCount: newPhotos.length };
                  types[typeKey] = { ...types[typeKey], items: typeItems };
                }
              }
              return { ...prev, [rapId]: { ...rap, items, types } };
            });
            setFotoEditor(fe => ({ ...fe, photos: newPhotos }));
          }}
          onClose={() => setFotoEditor(null)}
        />
      )}


      {/* ══════ ACTION / BLOCKED MODAL ══════ */}
      {modal && (
        <div role="alertdialog" aria-label={modal.type === "bevestiging" ? "Bevestiging vereist" : "Geblokkeerd"} aria-modal="true" style={{ position: "fixed", inset: 0, background: T.overlay, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1001, backdropFilter: "blur(4px)" }}>
          <div style={{ background: T.modalBg, borderRadius: 14, padding: 24, maxWidth: 400, width: "90%", border: modal.type === "bevestiging" ? `1px solid ${T.accent}40` : "1px solid #EF444440", boxShadow: "0 8px 24px rgba(0,0,0,.1)" }}>
            <div style={{ fontSize: 28, marginBottom: 10, textAlign: "center" }}>{modal.type === "bevestiging" ? "\u2753" : "\u{1F6AB}"}</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.text2, textAlign: "center", marginBottom: 6 }}>{modal.type === "bevestiging" ? "Bevestig" : "Geblokkeerd"}</div>
            <div style={{ fontSize: 12, color: T.text3, textAlign: "center", lineHeight: 1.7, marginBottom: 20, whiteSpace: "pre-line" }}>{modal.msg}</div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              {modal.actie ? (
                <>
                  <button onClick={() => setModal(null)}
                    style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${T.text5}`, background: T.bg, color: T.text, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                    Annuleer
                  </button>
                  <button onClick={modal.actie}
                    style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: T.accent, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                    Bevestig
                  </button>
                </>
              ) : (
                <button onClick={() => setModal(null)}
                  style={{ padding: "8px 20px", borderRadius: 6, border: "none", background: "#EF4444", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                  Begrepen
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<BackofficePortal />);
</script></body></html>
