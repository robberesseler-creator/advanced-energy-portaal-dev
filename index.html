/* ─── FUZZY SEARCH ─── */

const fuzzyScore = (query, target) => {
  if (!query || !target) return 0;
  const q = query.toLowerCase();
  const t = target.toLowerCase();
  // Exact substring = beste score
  if (t.includes(q)) return 1.0;
  // Fuzzy: loop door query chars en zoek ze in volgorde in target
  let qi = 0, ti = 0, score = 0, consecutive = 0, maxConsec = 0;
  while (qi < q.length && ti < t.length) {
    if (q[qi] === t[ti]) {
      consecutive++;
      maxConsec = Math.max(maxConsec, consecutive);
      score += 1 + consecutive * 0.5; // bonus voor opeenvolgende matches
      if (ti === 0 || t[ti - 1] === " " || t[ti - 1] === "-" || t[ti - 1] === "@" || t[ti - 1] === ".") score += 2; // bonus voor woordstart
      qi++;
    } else {
      consecutive = 0;
    }
    ti++;
  }
  if (qi < q.length) return 0; // niet alle query chars gevonden
  // Normaliseer: hoe korter de target tov query, hoe beter
  const ratio = q.length / t.length;
  return (score / (q.length * 3.5)) * (0.5 + ratio * 0.5);
};

const fuzzyMatch = (query, project) => {
  if (!query) return 1;
  const velden = [
    project.klant,
    project.naam,
    project.dossierNr,
    project.adres,
    project.klantData?.email || "",
  ];
  let best = 0;
  for (const v of velden) {
    const s = fuzzyScore(query, v);
    if (s > best) best = s;
  }
  return best;
};

// === FOTO EDITOR COMPONENT ===
function FotoEditor({ photos, onSave, onClose, T }) {
  const canvasRef = React.useRef(null);
  const [currentIdx, setCurrentIdx] = React.useState(photos._startIdx || 0);
  const [tool, setTool] = React.useState("pen"); // pen, circle, arrow, eraser
  const [color, setColor] = React.useState("#FF0000");
  const [lineWidth, setLineWidth] = React.useState(3);
  const [drawing, setDrawing] = React.useState(false);
  const [history, setHistory] = React.useState([]);
  const [undoStack, setUndoStack] = React.useState([]);
  const startRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const overlayRef = React.useRef(null);

  const loadImage = (idx) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      imgRef.current = img;
      const canvas = canvasRef.current;
      if (!canvas) return;
      canvas.width = img.width;
      canvas.height = img.height;
      redraw();
    };
    img.onerror = () => {
      // Retry without crossOrigin for local/base64
      const img2 = new Image();
      img2.onload = () => {
        imgRef.current = img2;
        const canvas = canvasRef.current;
        if (!canvas) return;
        canvas.width = img2.width;
        canvas.height = img2.height;
        redraw();
      };
      img2.src = photos[idx];
    };
    img.src = photos[idx];
  };

  React.useEffect(() => { if (photos.length > 0) loadImage(currentIdx); }, [currentIdx, photos]);

  const redraw = () => {
    const canvas = canvasRef.current;
    if (!canvas || !imgRef.current) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(imgRef.current, 0, 0);
    history.forEach(h => drawShape(ctx, h));
  };

  React.useEffect(() => { redraw(); }, [history]);

  const drawShape = (ctx, shape) => {
    ctx.strokeStyle = shape.color;
    ctx.lineWidth = shape.lineWidth;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (shape.type === "path") {
      ctx.beginPath();
      shape.points.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.stroke();
    } else if (shape.type === "circle") {
      const rx = Math.abs(shape.ex - shape.sx) / 2;
      const ry = Math.abs(shape.ey - shape.sy) / 2;
      const cx = (shape.sx + shape.ex) / 2;
      const cy = (shape.sy + shape.ey) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (shape.type === "arrow") {
      ctx.beginPath();
      ctx.moveTo(shape.sx, shape.sy);
      ctx.lineTo(shape.ex, shape.ey);
      ctx.stroke();
      const angle = Math.atan2(shape.ey - shape.sy, shape.ex - shape.sx);
      const headLen = 15;
      ctx.beginPath();
      ctx.moveTo(shape.ex, shape.ey);
      ctx.lineTo(shape.ex - headLen * Math.cos(angle - 0.4), shape.ey - headLen * Math.sin(angle - 0.4));
      ctx.moveTo(shape.ex, shape.ey);
      ctx.lineTo(shape.ex - headLen * Math.cos(angle + 0.4), shape.ey - headLen * Math.sin(angle + 0.4));
      ctx.stroke();
    } else if (shape.type === "rect") {
      ctx.strokeRect(shape.sx, shape.sy, shape.ex - shape.sx, shape.ey - shape.sy);
    }
  };

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  };

  const onDown = (e) => {
    e.preventDefault();
    setDrawing(true);
    const pos = getPos(e);
    startRef.current = pos;
    if (tool === "pen" || tool === "eraser") {
      setHistory(h => [...h, { type: "path", points: [pos], color: tool === "eraser" ? "#FFFFFF" : color, lineWidth: tool === "eraser" ? lineWidth * 4 : lineWidth }]);
    }
    setUndoStack([]);
  };

  const onMove = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    if (tool === "pen" || tool === "eraser") {
      setHistory(h => {
        const copy = [...h];
        copy[copy.length - 1] = { ...copy[copy.length - 1], points: [...copy[copy.length - 1].points, pos] };
        return copy;
      });
    } else {
      // Preview shape on overlay canvas
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      redraw();
      drawShape(ctx, { type: tool, sx: startRef.current.x, sy: startRef.current.y, ex: pos.x, ey: pos.y, color, lineWidth });
    }
  };

  const onUp = (e) => {
    if (!drawing) return;
    setDrawing(false);
    if (tool !== "pen" && tool !== "eraser" && startRef.current) {
      const pos = e.changedTouches ? { x: 0, y: 0 } : getPos(e);
      const finalPos = e.changedTouches ? getPos({ touches: e.changedTouches }) : pos;
      setHistory(h => [...h, { type: tool, sx: startRef.current.x, sy: startRef.current.y, ex: finalPos.x, ey: finalPos.y, color, lineWidth }]);
    }
  };

  const undo = () => {
    if (history.length === 0) return;
    setUndoStack(u => [...u, history[history.length - 1]]);
    setHistory(h => h.slice(0, -1));
  };

  const redo = () => {
    if (undoStack.length === 0) return;
    setHistory(h => [...h, undoStack[undoStack.length - 1]]);
    setUndoStack(u => u.slice(0, -1));
  };

  const savePhoto = () => {
    const canvas = canvasRef.current;
    if (!canvas) { alert("Geen canvas beschikbaar"); return; }
    try {
      const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
      const newPhotos = [...photos];
      newPhotos[currentIdx] = dataUrl;
      onSave(newPhotos);
      setHistory([]);
      alert("Foto opgeslagen!");
    } catch(e) {
      console.warn("Canvas CORS:", e);
      alert("Annotaties opslaan niet mogelijk voor externe foto's. Gebruik 'Sluiten' om terug te gaan.");
    }
  };

  const deletePhoto = () => {
    if (!confirm("Foto verwijderen?")) return;
    const newPhotos = [...photos].filter((_, i) => i !== currentIdx);
    if (typeof onSave === "function") onSave(newPhotos);
    if (newPhotos.length === 0) { onClose(); return; }
    setCurrentIdx(Math.max(0, currentIdx - 1));
    setHistory([]);
  };

  const movePhoto = (fromIdx, toType) => {
    // This will be handled by parent
    if (typeof onSave === "function") {
      onSave(photos, { action: "move", fromIdx, toType });
    }
  };

  const tools = [
    { id: "pen", icon: String.fromCodePoint(0x270F), label: "Tekenen" },
    { id: "circle", icon: String.fromCodePoint(0x2B55), label: "Cirkel" },
    { id: "arrow", icon: String.fromCodePoint(0x2197), label: "Pijl" },
    { id: "rect", icon: String.fromCodePoint(0x25A1), label: "Rechthoek" },
    { id: "eraser", icon: String.fromCodePoint(0x1F9F9), label: "Gum" },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 3000, background: "rgba(0,0,0,.85)", display: "flex", flexDirection: "column" }}>
      {/* Toolbar */}
      <div style={{ padding: "8px 16px", background: "#1a1a2e", display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
        {/* Tool buttons */}
        {tools.map(t => (
          <button key={t.id} onClick={() => setTool(t.id)} title={t.label}
            style={{ padding: "6px 10px", borderRadius: 6, border: tool === t.id ? "2px solid #8B5CF6" : "1px solid #333", background: tool === t.id ? "#8B5CF620" : "transparent", color: "#fff", fontSize: 14, cursor: "pointer" }}>
            {t.icon}
          </button>
        ))}
        <div style={{ width: 1, height: 24, background: "#333", margin: "0 4px" }} />
        {/* Color picker */}
        <input type="color" value={color} onChange={e => setColor(e.target.value)} style={{ width: 28, height: 28, border: "none", cursor: "pointer", borderRadius: 4 }} />
        {/* Line width */}
        <input type="range" min="1" max="10" value={lineWidth} onChange={e => setLineWidth(Number(e.target.value))} style={{ width: 80 }} />
        <span style={{ fontSize: 10, color: "#888" }}>{lineWidth}px</span>
        <div style={{ width: 1, height: 24, background: "#333", margin: "0 4px" }} />
        {/* Undo/Redo */}
        <button onClick={undo} style={{ padding: "4px 8px", borderRadius: 4, border: "1px solid #333", background: "transparent", color: "#aaa", fontSize: 12, cursor: "pointer" }} title="Ongedaan maken">Undo</button>
        <button onClick={redo} style={{ padding: "4px 8px", borderRadius: 4, border: "1px solid #333", background: "transparent", color: "#aaa", fontSize: 12, cursor: "pointer" }} title="Opnieuw">Redo</button>
        <div style={{ flex: 1 }} />
        {/* Actions */}
        <button onClick={savePhoto} style={{ padding: "6px 14px", borderRadius: 6, border: "none", background: "#22C55E", color: "#fff", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Opslaan</button>
        <button onClick={deletePhoto} style={{ padding: "6px 14px", borderRadius: 6, border: "1px solid #DC2626", background: "transparent", color: "#DC2626", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Verwijder</button>
        <button onClick={onClose} style={{ padding: "6px 14px", borderRadius: 6, border: "1px solid #555", background: "transparent", color: "#aaa", fontSize: 11, cursor: "pointer" }}>Sluiten</button>
      </div>

      {/* Canvas area */}
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", padding: 16 }}>
        <canvas ref={canvasRef}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={() => setDrawing(false)}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
          style={{ maxWidth: "100%", maxHeight: "100%", cursor: tool === "pen" ? "crosshair" : tool === "eraser" ? "cell" : "crosshair", borderRadius: 8 }} />
      </div>

      {/* Thumbnail strip */}
      {photos.length > 1 && (
        <div style={{ padding: "8px 16px", background: "#1a1a2e", display: "flex", gap: 6, overflowX: "auto", flexShrink: 0 }}>
          {photos.map((p, i) => (
            <img key={i} src={p} onClick={() => { setCurrentIdx(i); setHistory([]); }}
              style={{ width: 56, height: 42, objectFit: "cover", borderRadius: 4, cursor: "pointer", border: i === currentIdx ? "2px solid #8B5CF6" : "2px solid transparent", opacity: i === currentIdx ? 1 : 0.6 }} />
          ))}
        </div>
      )}
    </div>
  );
}

  const warmteBerekening = useMemo(() => {
    const opp = parseFloat(warmteData.woonOpp) || 0;
    if (opp <= 0) return null;

    // Warmteverlies coëfficiënt per m² op basis van isolatie (W/m²)
    const isolatieW = { A: 30, B: 45, C: 60, D: 80, E: 100, F: 120 }[warmteData.isolatie] || 60;
    // Bouwjaar correctie
    const bouwjaarF = { "voor-1970": 1.3, "1970-1990": 1.15, "1990-2000": 1.0, "2000-2010": 0.9, "2010-2020": 0.8, "na-2020": 0.7 }[warmteData.bouwjaar] || 1.0;
    // Glas correctie
    const glasF = { enkel: 1.3, dubbel: 1.0, hr: 0.85, "triple": 0.75 }[warmteData.glasType] || 1.0;
    // Verdiepingen factor (meer verlies bij meer verdiepingen)
    const verdF = parseInt(warmteData.verdiepingen) === 1 ? 0.9 : parseInt(warmteData.verdiepingen) === 3 ? 1.1 : 1.0;

    // Totaal warmteverlies in Watt
    const warmteverliesW = opp * isolatieW * bouwjaarF * glasF * verdF;
    const warmteverliesKW = warmteverliesW / 1000;

    // Aanbevolen WP vermogen (10-15% buffer)
    const wpVermogen = warmteverliesKW * 1.12;

    // COP inschatting (lucht/water gemiddeld 3.5, lucht/lucht 4.0)
    const cop = 3.5;

    // Jaarlijks energieverbruik WP (2000 vollast-uren voor België)
    const vollastUren = 2000;
    const elekVerbruikWP = (warmteverliesKW * vollastUren) / cop;

    // Huidig systeem vergelijking
    const gasPrijs = parseFloat(warmteData.gasPrijs) || 0.12;
    const elekPrijs = parseFloat(warmteData.elekPrijs) || 0.30;
    const rendementGas = 0.9;
    const gasVerbruik = (warmteverliesKW * vollastUren) / rendementGas;
    const kostenGas = Math.round(gasVerbruik * gasPrijs);
    const kostenWP = Math.round(elekVerbruikWP * elekPrijs);
    const besparing = kostenGas - kostenWP;

    // CO2 besparing (gas: 0.2 kg/kWh, elek: 0.15 kg/kWh België)
    const co2Gas = Math.round(gasVerbruik * 0.2);
    const co2WP = Math.round(elekVerbruikWP * 0.15);
    const co2Besparing = co2Gas - co2WP;

    return {
      warmteverliesKW: warmteverliesKW.toFixed(1),
      wpVermogen: wpVermogen.toFixed(1),
      cop,
      elekVerbruikWP: Math.round(elekVerbruikWP),
      gasVerbruik: Math.round(gasVerbruik),
      kostenGas, kostenWP, besparing,
      co2Gas, co2WP, co2Besparing,
    };
  }, [warmteData]);

  const dakBerekening = useMemo(() => {
    const opp = parseFloat(dakData.oppervlakte) || 0;
    if (opp <= 0) return null;
    const paneelM2 = 1.7 * 1.0; // standaard paneel ~1.7m²
    const paneelWp = parseInt(dakData.paneelWatt) || 420;
    // Schaduw factor
    const schaduwF = { geen: 1.0, licht: 0.85, matig: 0.7, zwaar: 0.5 }[dakData.schaduw] || 1;
    // Oriëntatie factor
    const orientF = { zuid: 1.0, "zuid-oost": 0.95, "zuid-west": 0.95, oost: 0.85, west: 0.85, noord: 0.6 }[dakData.orientatie] || 1;
    // Hellingshoek factor (optimaal ~35°)
    const hoek = parseInt(dakData.hellingshoek) || 35;
    const hoekF = 1 - Math.abs(hoek - 35) * 0.005;
    // Bruikbare oppervlakte (80% van totaal voor rand, schoorsteen, etc.)
    const bruikbaar = opp * 0.8;
    const aantalPanelen = Math.floor(bruikbaar / paneelM2);
    const wpTotaal = aantalPanelen * paneelWp;
    const kWp = wpTotaal / 1000;
    // Geschatte jaaropbrengst (België: ~900 kWh per kWp)
    const jaarOpbrengst = Math.round(kWp * 900 * orientF * hoekF * schaduwF);
    // Geschatte besparing (€0.30/kWh gemiddeld)
    const jaarBesparing = Math.round(jaarOpbrengst * 0.30);
    return { bruikbaar: Math.round(bruikbaar), aantalPanelen, kWp: kWp.toFixed(1), jaarOpbrengst, jaarBesparing };
  }, [dakData]);

  const parseCsv = (tekst) => {
    const regels = tekst.split("\n").filter(r => r.trim());
    if (regels.length < 2) return [];
    const headers = regels[0].split(/[,;\t]/).map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
    return regels.slice(1).map(r => {
      const velden = r.split(/[,;\t]/).map(v => v.trim().replace(/^"|"$/g, ""));
      const obj = {};
      headers.forEach((h, i) => { obj[h] = velden[i] || ""; });
      return obj;
    });
  };

    };

  // Simpele techniek-detectie op basis van tekst

  };

  const voegFaseToe = (techKey) => {

  const verplaatsFase = (techKey, fIdx, richting) => {

  // Sync templates naar alle projecten

      // Zoek bestaande fases van deze techniek

      const nieuweFases = tmpl.map((ft, i) => {
        const bestaand = oudeT[i];
        const faseId = bestaand?.id || `${techKey}-f${i + 1}-${uid()}`;
        const nieuweSubs = ft.subtaken.map((sNaam, j) => {
          const oudeNaam = typeof sNaam === "string" ? sNaam : sNaam.naam;
          const bestaandeSub = bestaand?.subtaken?.find(s => s.naam === oudeNaam);
          if (bestaandeSub) return { ...bestaandeSub };
          return { id: `s${j + 1}`, naam: oudeNaam, voltooid: false, voltooidOp: null, voltooidDoor: null };
        });
        return {
          id: faseId, naam: ft.naam, volgorde: i + 1,
          afhankelijkheid: i > 0 ? null : null,
          technieker: bestaand?.technieker || null, notitie: bestaand?.notitie || "",
          faseDeadline: bestaand?.faseDeadline || "", faseUur: bestaand?.faseUur || "09:00",
          techniekId: techKey, kolom: bestaand?.kolom || "verwerking", subtaken: nieuweSubs,
        };
      });
      // Fix afhankelijkheden binnen deze techniek
      for (let i = 1; i < nieuweFases.length; i++) {
        nieuweFases[i].afhankelijkheid = nieuweFases[i - 1].id;
      }
      // Combineer: andere fases + nieuwe fases, hernummer volgorde
      const alleFases = [...andereFases, ...nieuweFases];

  const voegKlantToe = () => {

    const klantData = {

    setProjecten(prev => prev.map(p => p.id !== klantProj.id ? p : {

  };

  const updateRapportFase = (faseId, veld, waarde) => {
    setRapportFases(prev => prev.map(f => f.id === faseId ? { ...f, [veld]: waarde } : f));
  };

  const slaRapportDeadlinesOp = () => {
    setProjecten(pr => pr.map(p => p.id !== rapportProj ? p : {
      ...p, fases: p.fases.map(f => {
        const rf = rapportFases.find(x => x.id === f.id);
        return rf ? { ...f, faseDeadline: rf.faseDeadline, faseUur: rf.faseUur, technieker: rf.technieker } : f;
      })
    }));
  };

  const genereerPDF = () => {
    const proj = projecten.find(p => p.id === rapportProj);
    if (!proj) return;
    const tech = TECHNIEKEN[proj.technieken[0]];
    const techLabel = proj.technieken.map(t => `${TECHNIEKEN[t].icoon} ${TECHNIEKEN[t].volledig}`).join(" + ");
    const vg = berekenVoortgang(proj);
    const st = berekenStatus(proj);

    // Bouw HTML rapport
    const faseRijen = rapportFases.map(f => {
      const tkObj = f.technieker ? tkLijst.find(t => t.id === f.technieker) : null;
      const vd = f.subtaken.filter(s => s.voltooid).length;
      const vt = f.subtaken.length;
      const statusTekst = f.kolom === "afgewerkt" ? "Afgewerkt" : f.kolom === "uitvoering" ? "In uitvoering" : "Wachtend";
      const statusKleur = f.kolom === "afgewerkt" ? "#22C55E" : f.kolom === "uitvoering" ? "#3B82F6" : "#94A3B8";
      const subtakenHtml = f.subtaken.map(s => {
        return `<div>
          <div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px;">
            <span style="color:${s.voltooid ? '#22C55E' : '#94A3B8'};">${s.voltooid ? '\u2713' : '\u25CB'}</span>
            <span style="color:${s.voltooid ? '#64748B' : '#1E293B'};${s.voltooid ? 'text-decoration:line-through;' : ''}">${s.naam}</span>
          </div>
          ${s.voltooid && s.voltooidOp ? `<div style="margin-left:18px;font-size:9px;color:#22C55E;">\u2713 ${s.voltooidOp}${s.voltooidDoor ? ` <span style="color:#94A3B8;">\u2014 ${s.voltooidDoor}</span>` : ""}</div>` : ""}
        </div>`;
      }).join("");

      return `<tr>
        <td style="padding:10px 12px;border-bottom:1px solid #E2E8F0;font-weight:600;font-size:13px;color:#1E293B;vertical-align:top;">${f.volgorde}. ${f.naam}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #E2E8F0;vertical-align:top;">
          <span style="padding:2px 8px;border-radius:4px;background:${statusKleur}18;color:${statusKleur};font-size:11px;font-weight:600;">${statusTekst}</span>
          <div style="font-size:10px;color:#64748B;margin-top:4px;">${vd}/${vt} subtaken</div>
        </td>
        <td style="padding:10px 12px;border-bottom:1px solid #E2E8F0;font-size:12px;color:#1E293B;vertical-align:top;">${tkObj ? tkObj.naam : '<span style="color:#94A3B8;">Niet toegewezen</span>'}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #E2E8F0;font-family:monospace;font-size:12px;color:#1E293B;vertical-align:top;">${f.faseDeadline ? `${fmtDatum(f.faseDeadline)} om ${f.faseUur}` : '<span style="color:#EF4444;">Niet ingesteld</span>'}</td>
        <td style="padding:10px 12px;border-bottom:1px solid #E2E8F0;vertical-align:top;">${subtakenHtml}</td>
      </tr>`;
    }).join("");

    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Rapport ${proj.dossierNr}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } @page { margin: 15mm; size: A4 landscape; } }
      body { font-family: 'DM Sans',system-ui,-apple-system,sans-serif; margin: 0; padding: 32px; background: #fff; color: #1E293B; }
      .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #3b82f6; }
      .logo { font-size: 20px; font-weight: 800; color: #3b82f6; }
      .meta { text-align: right; font-size: 11px; color: #64748B; }
      .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
      .info-box { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 14px; }
      .info-box h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 8px 0; }
      .info-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
      .info-label { color: #64748B; }
      .info-val { font-weight: 500; }
      table { width: 100%; border-collapse: collapse; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; }
      th { background: #F1F5F9; padding: 8px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #64748B; text-align: left; border-bottom: 2px solid #E2E8F0; }
      .progress-bar { width: 100%; height: 8px; background: #E2E8F0; border-radius: 4px; margin-top: 8px; }
      .progress-fill { height: 100%; border-radius: 4px; }
      .footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #E2E8F0; font-size: 10px; color: #94A3B8; display: flex; justify-content: space-between; }
    </style></head><body>
    <div class="header">
      <div>
        <div class="logo">\u26A1 Uitvoeringsdossier</div>
        <div style="font-size:22px;font-weight:700;color:#1E293B;margin-top:4px;">${proj.klant}</div>
        <div style="font-size:12px;color:#64748B;margin-top:2px;">${proj.adres}</div>
      </div>
      <div class="meta">
        <div style="font-size:16px;font-weight:700;color:#1E293B;font-family:monospace;">${proj.dossierNr}</div>
        <div style="margin-top:4px;">${techLabel}</div>
        <div>Rapport aangemaakt: ${new Date().toLocaleDateString("nl-BE")}</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-box">
        <h3 style="color:#3b82f6;">Klantgegevens</h3>
        <div class="info-row"><span class="info-label">Klantnr</span><span class="info-val">${proj.klantData.klantnr}</span></div>
        <div class="info-row"><span class="info-label">Telefoon</span><span class="info-val">${proj.klantData.tel}</span></div>
        <div class="info-row"><span class="info-label">E-mail</span><span class="info-val" style="color:#3b82f6;">${proj.klantData.email}</span></div>
      </div>
      <div class="info-box">
        <h3 style="color:#3b82f6;">Projectinfo</h3>
        <div class="info-row"><span class="info-label">Aangemaakt</span><span class="info-val">${fmtDatum(proj.aangemaakt)}</span></div>
        <div class="info-row"><span class="info-label">Datum</span><span class="info-val" style="color:${st==='rood'?'#EF4444':'#1E293B'};">${fmtDatum(proj.deadline)}</span></div>
      </div>
      <div class="info-box">
        <h3 style="color:#22C55E;">Voortgang</h3>
        <div style="font-size:28px;font-weight:800;color:${vg===100?'#22C55E':'#3b82f6'};text-align:center;margin:8px 0;">${vg}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${vg}%;background:${vg===100?'#22C55E':'#3b82f6'};"></div></div>
        <div style="text-align:center;font-size:11px;color:#64748B;margin-top:6px;">${rapportFases.filter(f=>f.kolom==="afgewerkt").length} / ${rapportFases.length} fases afgerond</div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th style="width:22%;">Fase</th>
        <th style="width:13%;">Status</th>
        <th style="width:16%;">Technieker</th>
        <th style="width:18%;">Deadline</th>
        <th>Subtaken</th>
      </tr></thead>
      <tbody>${faseRijen}</tbody>
    </table>
    <div class="footer">
      <span>\u26A1 Backoffice Portal \u2014 ${proj.dossierNr}</span>
      <span>${proj.klant} \u2014 ${techLabel}</span>
    </div>
    </body></html>`;

    // Open in nieuw venster voor print/PDF
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, "_blank");
    if (w) { w.onload = () => { setTimeout(() => w.print(), 500); }; }
  };

  /* ─── RENDER ─── */

  // DM Sans font laden (§2.1)
  useEffect(() => {
    if (!document.querySelector('link[href*="DM+Sans"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap';
      document.head.appendChild(link);
    }
  }, []);

  // Sync met standalone bezoekrapport via localStorage
  useEffect(() => {
    // Check localStorage for bezoekrapport data on load and on storage events
    const checkBrData = () => {
      try {
        const raw = localStorage.getItem("bzr-submitted");
        if (raw) {
          const submissions = JSON.parse(raw);
          if (Array.isArray(submissions) && submissions.length > 0) {
            const newRapporten = {};
            submissions.forEach((sub, i) => {
              const rapId = "rap-" + sub.savedAt + "-" + i;
              if (!brRapporten[rapId]) {
                newRapporten[rapId] = {
                  projectId: null,
                  klant: sub.klantNaam || "",
                  adres: sub.klantAdres || "",
                  types: sub.progress || {},
                  items: sub.itemData || {},
                  ontvangen: sub.savedAt ? new Date(sub.savedAt).toLocaleString("nl-BE") : new Date().toLocaleString("nl-BE"),
                  dossierNr: null,
                  pdf: false,
                  gekoppeld: false,
                };
              }
            });
            if (Object.keys(newRapporten).length > 0) {
              setBrRapporten(prev => ({ ...prev, ...newRapporten }));
            }
          }
        }
      } catch (e) {}
    };
    checkBrData();
    const handler = (e) => {
      if (e.key === "bzr-submitted") checkBrData();
    };
    window.addEventListener("storage", handler);
    // Also poll every 3 seconds as fallback (same-tab changes don't fire storage event)
    const poll = setInterval(checkBrData, 3000);
    return () => { window.removeEventListener("storage", handler); clearInterval(poll); };
  }, []);


  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: T.bg, minHeight: "100vh", color: T.text, display: "flex", flexDirection: "column" }}>

      {/* ── TOPBAR ── */}
      <div role="banner" style={{ background: T.bg2, borderBottom: `1px solid ${T.border}`, padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100, height: 52 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16, height: "100%" }}>
          <div role="button" aria-label="Instellingen openen" title="Instellingen" onClick={() => setInstellingen(true)} style={{ width: 30, height: 30, borderRadius: 7, background: "linear-gradient(135deg,#3b82f6,#60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: "#fff", fontWeight: 700, cursor: "pointer" }}
            onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"}
            onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>{"\u26A1"}</div>

          <nav role="tablist" aria-label="Hoofd navigatie" style={{ display: "flex", height: "100%" }}>
            <div role="tab" aria-selected={tab === "bezoekrapporten"} aria-label="Bezoekrapporten tab" onClick={() => setTab("bezoekrapporten")} style={{ padding: "0 20px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", borderBottom: tab === "bezoekrapporten" ? "2px solid #8B5CF6" : "2px solid transparent", color: tab === "bezoekrapporten" ? T.text2 : T.text4, fontSize: 13, fontWeight: 600 }}>
              Bezoekrapporten
            </div>
            <div role="tab" aria-selected={tab === "projecten" || tab === "historiek"} aria-label="Projecten tab" onClick={() => setTab("projecten")} style={{ padding: "0 20px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", borderBottom: (tab === "projecten" || tab === "historiek") ? `2px solid ${T.accent}` : "2px solid transparent", color: (tab === "projecten" || tab === "historiek") ? T.text2 : T.text4, fontSize: 13, fontWeight: 600 }}>
              Projecten
              <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 8, background: T.border2, color: T.text3, fontFamily: "monospace" }}>{stats.t}</span>
            </div>
            {actief && (
              <div role="tab" aria-selected={tab === "dossier"} aria-label={`Dossier ${actief.klant}`} onClick={() => setTab("dossier")} style={{ padding: "0 20px", display: "flex", alignItems: "center", gap: 6, cursor: "pointer", borderBottom: tab === "dossier" ? "2px solid #3b82f6" : "2px solid transparent", color: tab === "dossier" ? T.text2 : T.text4, fontSize: 13, fontWeight: 600 }}>
                {actief.klant}
                <span role="button" aria-label="Dossier sluiten" title="Dossier sluiten" onClick={e => { e.stopPropagation(); setSelProj(null); setTab("projecten"); }} style={{ fontSize: 12, color: T.text4, cursor: "pointer", marginLeft: 4, padding: "0 4px", borderRadius: 3 }}>{"\u2715"}</span>
              </div>
            )}
          </nav>
        </div>
        <div role="status" aria-label="Project statistieken" style={{ display: tab === "bezoekrapporten" ? "none" : "flex", gap: 12, alignItems: "center", fontSize: 12, color: T.text4 }}>
          <span>{stats.t} totaal</span>
          <span style={{ color: T.text5 }}>{"\u00B7"}</span>
          <span style={{ color: "#3B82F6" }}>{stats.b} bezig</span>
          <span style={{ color: T.text5 }}>{"\u00B7"}</span>
          <span style={{ color: "#22C55E" }}>{stats.k} klaar</span>
          <span style={{ color: T.text5 }}>{"\u00B7"}</span>
          <span style={{ color: "#EF4444" }}>{stats.kr} kritisch</span>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", display: "flex" }}>

        {/* ══════ TAB: PROJECTEN ══════ */}
        {tab === "projecten" && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>

            {/* Subtab bar */}
            <div style={{ padding: "0 24px", borderBottom: `1px solid ${T.border}`, display: "flex", gap: 0, background: T.bg2, flexShrink: 0 }}>
              <div onClick={() => setTab("projecten")} style={{ padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: tab === "projecten" ? T.accent : T.text4, borderBottom: tab === "projecten" ? `2px solid ${T.accent}` : "2px solid transparent", marginBottom: -1 }}>
                Actieve projecten <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 8, background: T.border2, color: T.text3, fontFamily: "monospace", marginLeft: 6 }}>{stats.t}</span>
              </div>
              <div onClick={() => setTab("historiek")} style={{ padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: tab === "historiek" ? "#22C55E" : T.text4, borderBottom: tab === "historiek" ? "2px solid #22C55E" : "2px solid transparent", marginBottom: -1 }}>
                Historiek <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 8, background: T.border2, color: T.text3, fontFamily: "monospace", marginLeft: 6 }}>{archiefCount}</span>
              </div>
            </div>

            {/* Filter bar */}
            <div role="search" aria-label="Projecten filteren" style={{ padding: "10px 24px", borderBottom: `1px solid ${T.border}`, display: "flex", gap: 8, alignItems: "center", background: T.bg, flexShrink: 0 }}>
              <div style={{ position: "relative", flex: 1, maxWidth: 300 }}>
                <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: T.text4 }}>{"\uD83D\uDD0D"}</span>
                <input type="text" aria-label="Zoek projecten" placeholder="Zoek klant, adres, e-mail..." value={zoek} onChange={e => { setZoek(e.target.value); setPg(0); }}
                  style={{ width: "100%", padding: "8px 12px 8px 32px", borderRadius: 8, border: `1px solid ${T.border3}`, background: T.input, color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
              </div>
              <select aria-label="Filter op techniek" value={fTech} onChange={e => { setFTech(e.target.value); setPg(0); }}
                style={{ padding: "8px 10px", borderRadius: 8, border: `1px solid ${T.border3}`, background: T.input, color: T.text3, fontSize: 12, outline: "none" }}>
                <option value="alle">Alle technieken</option>
                {Object.entries(TECHNIEKEN).map(([k, v]) => <option key={k} value={k}>{v.icoon} {v.volledig}</option>)}
              </select>
              <select aria-label="Filter op status" value={fStat} onChange={e => { setFStat(e.target.value); setPg(0); }}
                style={{ padding: "8px 10px", borderRadius: 8, border: `1px solid ${T.border3}`, background: T.input, color: T.text3, fontSize: 12, outline: "none" }}>
                <option value="alle">Alle statussen</option>
                <option value="wit">Nieuw</option>
                <option value="bezig">Bezig</option>
                <option value="groen">Klaar</option>
                <option value="rood">Kritisch</option>
              </select>
              <div role="status" aria-live="polite" style={{ marginLeft: "auto", fontSize: 12, color: T.text4 }}>{gefilterd.length} resultaten</div>
              <button onClick={() => setToonNieuwProject(true)}
                style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: T.accent, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}
                onMouseEnter={e => e.currentTarget.style.background = "#2563EB"}
                onMouseLeave={e => e.currentTarget.style.background = T.accent}>
                + Nieuw project
              </button>
            </div>

            {/* Column headers */}
            {(() => {
              const KOLOMMEN_DEF = {
                status:    { l: "",           w: 28,  t: "Projectstatus",              vast: true },
                klant:     { l: "Klant",      w: null, t: "Klantnaam en dossiernummer", vast: true },
                techniek:  { l: "Techniek",   w: 200, t: "Geïnstalleerde technieken",  vast: false },
                voortgang: { l: "Voortgang",  w: 140, t: "Fases afgerond / totaal",    vast: false },
                deadline:  { l: "Datum",      w: 90,  t: "Projectdeadline",            vast: false },
                acties:    { l: "",           w: 120, t: "",                            vast: true },
              };
              const gesorteerdeKolommen = kolomVolgorde.map(id => ({ id, ...KOLOMMEN_DEF[id] }));
              const zichtbaar = gesorteerdeKolommen.filter(c => c.vast || zichtKolommen[c.id]);
              const verplaatsbaar = kolomVolgorde.filter(id => !KOLOMMEN_DEF[id].vast);

              const swapKolom = (fromId, toId) => {
                if (fromId === toId) return;
                setKolomVolgorde(prev => {
                  const n = [...prev];
                  const fi = n.indexOf(fromId);
                  const ti = n.indexOf(toId);
                  if (fi === -1 || ti === -1) return prev;
                  [n[fi], n[ti]] = [n[ti], n[fi]];
                  return n;
                });
              };

              return (
                <div role="row" aria-label="Kolom headers" style={{ display: "flex", padding: "8px 24px", borderBottom: `1px solid ${T.border2}`, background: T.bg2, gap: 6, alignItems: "center" }}>
                  {zichtbaar.map(c => {
                    const sortable = c.id !== "acties" && c.id !== "status" && c.id !== "techniek" && c.l;
                    const canDrag = !c.vast;
                    const isDragging = dragKolom === c.id;
                    const isDropTarget = dropTarget === c.id && dragKolom && dragKolom !== c.id;
                    return (
                      <div key={c.id}
                        onMouseDown={canDrag ? (e) => {
                          e.preventDefault();
                          setDragKolom(c.id);
                          document.body.style.cursor = "grabbing";
                          const onMove = (ev) => {
                            const el = document.elementFromPoint(ev.clientX, ev.clientY);
                            const headerEl = el?.closest?.("[data-kolom-id]");
                            setDropTarget(headerEl?.dataset?.kolomId || null);
                          };
                          const onUp = () => {
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                            document.body.style.cursor = "";
                            setDragKolom(prev => {
                              setDropTarget(dt => {
                                if (prev && dt && prev !== dt) {
                                  swapKolom(prev, dt);
                                }
                                return null;
                              });
                              return null;
                            });
                          };
                          window.addEventListener("mousemove", onMove);
                          window.addEventListener("mouseup", onUp);
                        } : undefined}
                        data-kolom-id={canDrag ? c.id : undefined}
                        role={sortable ? "columnheader" : undefined} title={c.t || undefined}
                        aria-sort={sortOp === c.id ? (sortDesc ? "descending" : "ascending") : undefined}
                        aria-label={sortable && c.l ? `Sorteer op ${c.l}` : undefined}
                        onClick={() => { if (!isDragging && sortable) doSort(c.id); }}
                        style={{
                          width: c.w || undefined, minWidth: c.w || undefined, flex: c.w ? undefined : 1,
                          fontSize: 10, fontWeight: 700, color: sortOp === c.id ? T.text : T.text4,
                          textTransform: "uppercase", letterSpacing: "0.06em",
                          cursor: canDrag ? (isDragging ? "grabbing" : "grab") : sortable ? "pointer" : "default",
                          display: "flex", alignItems: "center", gap: 3, userSelect: "none",
                          opacity: isDragging ? 0.35 : 1,
                          background: isDropTarget ? T.accent + "18" : "transparent",
                          borderRadius: 4, padding: "3px 4px", margin: "-3px -4px",
                          outline: isDropTarget ? `2px dashed ${T.accent}` : "none",
                          transition: "background .12s, opacity .12s, outline .12s",
                        }}>
                        {canDrag && <span style={{ fontSize: 10, color: isDragging ? T.accent : T.text5, letterSpacing: 0, lineHeight: 1 }}>{"\u2847"}</span>}
                        {c.l}{sortOp === c.id && <span style={{ fontSize: 8 }}>{sortDesc ? "\u25BC" : "\u25B2"}</span>}
                      </div>
                    );
                  })}
                  {/* Kolom instellingen knop */}
                  <div style={{ position: "relative" }}>
                    <span role="button" aria-label="Kolommen aanpassen" title="Kolommen aanpassen"
                      onClick={() => setKolomMenu(!kolomMenu)}
                      style={{ width: 22, height: 22, borderRadius: 4, border: `1px solid ${T.border3}`, background: kolomMenu ? T.accent : "transparent", color: kolomMenu ? "#fff" : T.text4, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, cursor: "pointer", transition: "all .15s" }}
                      onMouseEnter={e => { if (!kolomMenu) { e.currentTarget.style.borderColor = T.accent; e.currentTarget.style.color = T.accent; } }}
                      onMouseLeave={e => { if (!kolomMenu) { e.currentTarget.style.borderColor = T.border3; e.currentTarget.style.color = T.text4; } }}>
                      {"\u2630"}
                    </span>
                    {kolomMenu && (
                      <div style={{ position: "absolute", top: "100%", right: 0, marginTop: 4, background: T.card, border: `1px solid ${T.border2}`, borderRadius: 8, padding: "8px 4px", zIndex: 50, boxShadow: "0 4px 12px rgba(0,0,0,.08)", minWidth: 200 }}>
                        <div style={{ padding: "4px 10px", fontSize: 9, fontWeight: 700, color: T.text4, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 2 }}>Kolommen — sleep headers om te wisselen</div>
                        {verplaatsbaar.map((id, idx) => {
                          const kol = KOLOMMEN_DEF[id];
                          const aan = zichtKolommen[id];
                          return (
                            <div key={id}
                              style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", borderRadius: 5, cursor: "default", transition: "background .1s" }}
                              onMouseEnter={e => e.currentTarget.style.background = T.hover}
                              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                              <div onClick={() => setZichtKolommen(prev => ({ ...prev, [id]: !prev[id] }))}
                                style={{ width: 16, height: 16, borderRadius: 4, border: aan ? "none" : `2px solid ${T.text5}`, background: aan ? T.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", flexShrink: 0, cursor: "pointer" }}>
                                {aan && "\u2713"}
                              </div>
                              <span style={{ fontSize: 12, color: T.text2, fontWeight: 500, flex: 1 }}>{kol.l}</span>
                              <div style={{ display: "flex", gap: 2 }}>
                                <span onClick={() => { if (idx > 0) swapKolom(id, verplaatsbaar[idx - 1]); }}
                                  style={{ fontSize: 10, color: idx > 0 ? T.text4 : T.border3, cursor: idx > 0 ? "pointer" : "default", padding: "2px 4px", borderRadius: 3 }}
                                  onMouseEnter={e => { if (idx > 0) e.currentTarget.style.background = T.bg3; }}
                                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>{"\u25B2"}</span>
                                <span onClick={() => { if (idx < verplaatsbaar.length - 1) swapKolom(id, verplaatsbaar[idx + 1]); }}
                                  style={{ fontSize: 10, color: idx < verplaatsbaar.length - 1 ? T.text4 : T.border3, cursor: idx < verplaatsbaar.length - 1 ? "pointer" : "default", padding: "2px 4px", borderRadius: 3 }}
                                  onMouseEnter={e => { if (idx < verplaatsbaar.length - 1) e.currentTarget.style.background = T.bg3; }}
                                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>{"\u25BC"}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* Project rows — gegroepeerd per klant */}
            <div style={{ flex: 1, overflow: "auto" }} onClick={() => kolomMenu && setKolomMenu(false)}>
              {gegroepeerd.map(groep => {
                const statussen = groep.actief.map(p => berekenStatus(p));
                const prioriteit = { rood: 0, wit: 1, bezig: 2, groen: 3 };
                const slechtste = statussen.length ? statussen.reduce((a, b) => prioriteit[a] < prioriteit[b] ? a : b) : "groen";
                const sk = SK[slechtste];
                const gemVg = groep.actief.length ? Math.round(groep.actief.reduce((s, p) => s + berekenVoortgang(p), 0) / groep.actief.length) : 100;
                const vroegsteDeadline = groep.actief.reduce((min, p) => !min || new Date(p.deadline) < new Date(min) ? p.deadline : min, null);
                const alleArchief = groep.actief.length === 0;
                const eersteProj = groep.actief[0] || groep.hist[0];
                const histIds = new Set(groep.hist.map(p => p.id));

                return (
                  <div key={groep.klant} style={{ display: "flex", padding: "9px 24px", gap: 6, borderBottom: `1px solid ${T.border}10`, alignItems: "center", transition: "background .1s", cursor: "default", opacity: alleArchief ? 0.7 : 1 }}
                    onMouseEnter={e => e.currentTarget.style.background = T.hover}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    {kolomVolgorde.map(kolId => {
                      if (kolId === "status") return (
                        <div key="status" style={{ width: 28, minWidth: 28, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <div style={{ width: 10, height: 10, borderRadius: "50%", background: sk.dot }} />
                        </div>
                      );
                      if (kolId === "klant") return (
                        <div key="klant" style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, overflow: "hidden" }}>
                          <span onClick={() => openDossier(eersteProj.id)}
                            style={{ fontSize: 13, fontWeight: 600, color: T.text2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }}
                            onMouseEnter={e => e.currentTarget.style.color = T.accent}
                            onMouseLeave={e => e.currentTarget.style.color = T.text2}>
                            {groep.klant}
                          </span>
                          <span style={{ fontSize: 9, color: T.text5, fontFamily: "monospace", flexShrink: 0 }}>{eersteProj.dossierNr}</span>
                          {alleArchief && <span style={{ padding: "1px 6px", borderRadius: 3, background: "#D9770620", border: "1px solid #D9770640", color: "#D97706", fontSize: 9, fontWeight: 700, flexShrink: 0, letterSpacing: "0.04em" }}>ARCHIEF</span>}
                        </div>
                      );
                      if (kolId === "techniek" && zichtKolommen.techniek) return (
                        <div key="techniek" style={{ width: 200, minWidth: 200, display: "flex", gap: 3, flexWrap: "wrap", alignItems: "center" }}>
                          {groep.alle.map(p => {
                            const isHist = histIds.has(p.id);
                            return p.technieken.map(tKey => {
                              const tech = TECHNIEKEN[tKey];
                              return (
                                <span key={`${p.id}-${tKey}`} role="button" onClick={() => openDossier(p.id)} title={`${tech.volledig}${isHist ? " (historiek)" : ""}`}
                                  style={{ width: 24, height: 24, borderRadius: 5, background: tech.kleur + (isHist ? "08" : "18"), border: `1px solid ${tech.kleur}${isHist ? "18" : "30"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0, cursor: "pointer", opacity: isHist ? 0.35 : 1, position: "relative", transition: "all .15s" }}
                                  onMouseEnter={e => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = "scale(1.15)"; }}
                                  onMouseLeave={e => { e.currentTarget.style.opacity = isHist ? "0.35" : "1"; e.currentTarget.style.transform = "scale(1)"; }}>
                                  {tech.icoon}
                                  {isHist && <span style={{ position: "absolute", bottom: -2, right: -2, width: 9, height: 9, borderRadius: "50%", background: "#22C55E", border: `1.5px solid ${T.bg}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6, color: "#fff", fontWeight: 700, lineHeight: 1 }}>{"\u2713"}</span>}
                                </span>
                              );
                            });
                          })}
                        </div>
                      );
                      if (kolId === "voortgang" && zichtKolommen.voortgang) {
                        const alleFases = groep.actief.flatMap(p => p.fases);
                        const totFases = alleFases.length || 1;
                        return (
                          <div key="voortgang" role="progressbar" aria-valuenow={gemVg} aria-valuemin={0} aria-valuemax={100} aria-label={`Voortgang ${gemVg}%`} style={{ width: 140, minWidth: 140, display: "flex", alignItems: "center", gap: 6 }}>
                            <div style={{ flex: 1, height: 12, borderRadius: 5, background: T.bg3, display: "flex", gap: "1.5px", overflow: "hidden", padding: 1 }}>
                              {alleFases.map((f, fi) => {
                                const klr = f.kolom === "afgewerkt" ? "#22C55E" : f.kolom === "uitvoering" ? "#3B82F6" : T.border2;
                                const isFirst = fi === 0;
                                const isLast = fi === totFases - 1;
                                return (
                                  <div key={f.id || fi} title={`${f.volgorde}. ${f.naam} — ${f.kolom === "afgewerkt" ? "Afgewerkt" : f.kolom === "uitvoering" ? "In uitvoering" : "Wachtend"}`}
                                    style={{ flex: 1, height: "100%", background: klr, borderRadius: `${isFirst ? "3px" : "1px"} ${isLast ? "3px" : "1px"} ${isLast ? "3px" : "1px"} ${isFirst ? "3px" : "1px"}`, transition: "background .2s, opacity .15s", cursor: "default", opacity: f.kolom === "verwerking" ? 0.5 : 1 }}
                                    onMouseEnter={e => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.filter = "brightness(1.2)"; }}
                                    onMouseLeave={e => { e.currentTarget.style.opacity = f.kolom === "verwerking" ? "0.5" : "1"; e.currentTarget.style.filter = "none"; }} />
                                );
                              })}
                            </div>
                            <span style={{ fontSize: 10, color: T.text4, fontFamily: "monospace", minWidth: 28, textAlign: "right" }}>{gemVg}%</span>
                          </div>
                        );
                      }
                      if (kolId === "deadline" && zichtKolommen.deadline) return (
                        <div key="deadline" style={{ width: 90, minWidth: 90, fontSize: 11, color: slechtste === "rood" ? "#EF4444" : T.text3 }}>{fmtDatum(vroegsteDeadline)}</div>
                      );
                      if (kolId === "acties") return (
                        <div key="acties" style={{ width: 120, minWidth: 120, display: "flex", gap: 4 }}>
                          <button aria-label={`Details bekijken voor ${groep.klant}`} onClick={() => setDetailId(eersteProj.id)}
                            style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${T.border3}`, background: "transparent", color: T.text3, fontSize: 10, cursor: "pointer" }}
                            onMouseEnter={e => { e.currentTarget.style.background = T.border3; e.currentTarget.style.color = T.text; }}
                            onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = T.text3; }}>
                            Details
                          </button>
                          <button aria-label={`Rapport openen voor ${groep.klant}`} onClick={() => openRapport(eersteProj.id)}
                            style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${T.accent}40`, background: T.accentSoft, color: T.accent, fontSize: 10, cursor: "pointer", fontWeight: 600 }}
                            onMouseEnter={e => { e.currentTarget.style.background = T.accent; e.currentTarget.style.color = "#fff"; }}
                            onMouseLeave={e => { e.currentTarget.style.background = T.accentSoft; e.currentTarget.style.color = T.accent; }}>
                            Rapport
                          </button>
                        </div>
                      );
                      return null;
                    })}
                  </div>
                );
              })}
            </div>

            {/* Pagination */}
            <div style={{ padding: "10px 24px", borderTop: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 4, background: T.bg, flexShrink: 0 }}>
              <button onClick={() => setPg(Math.max(0, pg - 1))} disabled={pg === 0}
                style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.border3}`, background: pg === 0 ? T.bg2 : T.bg, color: pg === 0 ? T.border3 : T.text3, fontSize: 12, cursor: pg === 0 ? "default" : "pointer", fontWeight: 500 }}>
                {"\u2190"} Vorige
              </button>
              {Array.from({ length: Math.min(totPg, 9) }, (_, i) => {
                let p;
                if (totPg <= 9) p = i;
                else if (pg < 5) p = i;
                else if (pg > totPg - 6) p = totPg - 9 + i;
                else p = pg - 4 + i;
                return (
                  <button key={p} onClick={() => setPg(p)}
                    style={{ width: 32, height: 32, borderRadius: 6, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", background: pg === p ? T.accent : "transparent", color: pg === p ? "#fff" : T.text4 }}>
                    {p + 1}
                  </button>
                );
              })}
              <button onClick={() => setPg(Math.min(totPg - 1, pg + 1))} disabled={pg >= totPg - 1}
                style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.border3}`, background: pg >= totPg - 1 ? T.bg2 : T.bg, color: pg >= totPg - 1 ? T.border3 : T.text3, fontSize: 12, cursor: pg >= totPg - 1 ? "default" : "pointer", fontWeight: 500 }}>
                Volgende {"\u2192"}
              </button>
            </div>
          </div>
        )}

        {/* ══════ TAB: HISTORIEK ══════ */}
        {tab === "historiek" && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>

            {/* Subtab bar */}
            <div style={{ padding: "0 24px", borderBottom: `1px solid ${T.border}`, display: "flex", gap: 0, background: T.bg2, flexShrink: 0 }}>
              <div onClick={() => setTab("projecten")} style={{ padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: tab === "projecten" ? T.accent : T.text4, borderBottom: tab === "projecten" ? `2px solid ${T.accent}` : "2px solid transparent", marginBottom: -1 }}>
                Actieve projecten <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 8, background: T.border2, color: T.text3, fontFamily: "monospace", marginLeft: 6 }}>{stats.t}</span>
              </div>
              <div onClick={() => setTab("historiek")} style={{ padding: "10px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, color: tab === "historiek" ? "#22C55E" : T.text4, borderBottom: tab === "historiek" ? "2px solid #22C55E" : "2px solid transparent", marginBottom: -1 }}>
                Historiek <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 8, background: T.border2, color: T.text3, fontFamily: "monospace", marginLeft: 6 }}>{archiefCount}</span>
              </div>
            </div>

            {/* Filter bar */}
            <div style={{ padding: "10px 24px", borderBottom: `1px solid ${T.border}`, display: "flex", gap: 8, alignItems: "center", background: T.bg }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 13 }}>{"\uD83D\uDCDA"}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: "#22C55E" }}>Projecten ouder dan 1 jaar</span>
              </div>
              <div style={{ position: "relative", flex: 1, maxWidth: 300, marginLeft: 16 }}>
                <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: T.text4 }}>{"\uD83D\uDD0D"}</span>
                <input type="text" placeholder="Zoek in historiek..." value={histZoek} onChange={e => { setHistZoek(e.target.value); setHistPg(0); }}
                  style={{ width: "100%", padding: "8px 12px 8px 32px", borderRadius: 8, border: `1px solid ${T.border3}`, background: T.input, color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
              </div>
              <select value={histTech} onChange={e => { setHistTech(e.target.value); setHistPg(0); }}
                style={{ padding: "8px 10px", borderRadius: 8, border: `1px solid ${T.border3}`, background: T.input, color: T.text3, fontSize: 12, outline: "none" }}>
                <option value="alle">Alle technieken</option>
                {Object.entries(TECHNIEKEN).map(([k, v]) => <option key={k} value={k}>{v.icoon} {v.volledig}</option>)}
              </select>
              <div style={{ marginLeft: "auto", fontSize: 12, color: T.text4 }}>{historiek.length} resultaten</div>
            </div>

            {/* Column headers */}
            <div style={{ display: "flex", padding: "8px 24px", borderBottom: `1px solid ${T.border2}`, background: T.bg2, gap: 6, alignItems: "center" }}>
              {[
                { l: "",         w: 28,  t: "Status" },
                { l: "Klant",    w: null, t: "Klantnaam" },
                { l: "Techniek", w: 200, t: "Geïnstalleerde technieken" },
                { l: "Status",   w: 90,  t: "Projectstatus" },
                { l: "Datum",    w: 90,  t: "Projectdeadline" },
                { l: "",         w: 120, t: "" },
              ].map((c, i) => (
                <div key={i} title={c.t || undefined} style={{ width: c.w || undefined, minWidth: c.w || undefined, flex: c.w ? undefined : 1, fontSize: 10, fontWeight: 700, color: T.text4, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                  {c.l}
                </div>
              ))}
            </div>

            {/* Historiek rows — gegroepeerd per klant */}
            <div style={{ flex: 1, overflow: "auto" }}>
              {histGegroepeerd.length === 0 && (
                <div style={{ padding: 40, textAlign: "center", color: T.text5, fontSize: 13 }}>Geen afgeronde projecten gevonden</div>
              )}
              {histGegroepeerd.map(groep => {
                const vroegsteDeadline = groep.hist.reduce((min, p) => !min || new Date(p.deadline) < new Date(min) ? p.deadline : min, null);
                const eersteProj = groep.hist[0];
                const actiefIds = new Set(groep.actief.map(p => p.id));

                return (
                  <div key={groep.klant} style={{ display: "flex", padding: "9px 24px", gap: 6, borderBottom: `1px solid ${T.border}10`, alignItems: "center", transition: "background .1s" }}
                    onMouseEnter={e => e.currentTarget.style.background = T.hover}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <div style={{ width: 28, minWidth: 28, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#22C55E" }} />
                    </div>
                    <div onClick={() => openDossier(eersteProj.id)} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, overflow: "hidden", cursor: "pointer" }}
                      onMouseEnter={e => e.currentTarget.querySelector(".hist-naam").style.color = T.accent}
                      onMouseLeave={e => e.currentTarget.querySelector(".hist-naam").style.color = T.text2}>
                      <span className="hist-naam" style={{ fontSize: 13, fontWeight: 600, color: T.text2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {groep.klant}
                      </span>
                    </div>
                    <div style={{ width: 200, minWidth: 200, display: "flex", gap: 3, flexWrap: "wrap", alignItems: "center" }}>
                      {groep.alle.map(p => {
                        const isActief = actiefIds.has(p.id);
                        return p.technieken.map(tKey => {
                          const tech = TECHNIEKEN[tKey];
                          return (
                            <span key={`${p.id}-${tKey}`} onClick={e => { e.stopPropagation(); openDossier(p.id); }} title={`${tech.volledig}${isActief ? " (actief)" : " (historiek)"}`}
                              style={{ width: 24, height: 24, borderRadius: 5, background: tech.kleur + (isActief ? "08" : "18"), border: `1px solid ${tech.kleur}${isActief ? "18" : "30"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0, cursor: "pointer", opacity: isActief ? 0.35 : 1, position: "relative", transition: "all .15s" }}
                              onMouseEnter={e => { e.stopPropagation(); e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = "scale(1.15)"; }}
                              onMouseLeave={e => { e.currentTarget.style.opacity = isActief ? "0.35" : "1"; e.currentTarget.style.transform = "scale(1)"; }}>
                              {tech.icoon}
                              {isActief && <span style={{ position: "absolute", bottom: -2, right: -2, width: 9, height: 9, borderRadius: "50%", background: T.accent, border: `1.5px solid ${T.bg}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6, color: "#fff", fontWeight: 700, lineHeight: 1 }}>{"\u25B6"}</span>}
                            </span>
                          );
                        });
                      })}
                    </div>
                    <div style={{ width: 90, minWidth: 90, fontSize: 11, color: "#22C55E", fontFamily: "monospace" }}>
                      {"\u2713"} Klaar
                    </div>
                    <div style={{ width: 90, minWidth: 90, fontSize: 11, color: T.text3 }}>{fmtDatum(vroegsteDeadline)}</div>
                    <div style={{ width: 120, minWidth: 120, display: "flex", gap: 4 }}>
                      <button onClick={e => { e.stopPropagation(); setDetailId(eersteProj.id); }}
                        style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${T.border3}`, background: "transparent", color: T.text3, fontSize: 10, cursor: "pointer" }}
                        onMouseEnter={e => { e.currentTarget.style.background = T.border3; e.currentTarget.style.color = T.text; }}
                        onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = T.text3; }}>
                        Details
                      </button>
                      <button onClick={e => { e.stopPropagation(); openRapport(eersteProj.id); }}
                        style={{ padding: "4px 8px", borderRadius: 4, border: `1px solid ${T.accent}40`, background: T.accentSoft, color: T.accent, fontSize: 10, cursor: "pointer", fontWeight: 600 }}
                        onMouseEnter={e => { e.currentTarget.style.background = T.accent; e.currentTarget.style.color = "#fff"; }}
                        onMouseLeave={e => { e.currentTarget.style.background = T.accentSoft; e.currentTarget.style.color = T.accent; }}>
                        Rapport
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Pagination */}
            {histTotPg > 1 && (
              <div style={{ padding: "10px 24px", borderTop: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 4, background: T.bg, flexShrink: 0 }}>
                <button onClick={() => setHistPg(Math.max(0, histPg - 1))} disabled={histPg === 0}
                  style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.border3}`, background: histPg === 0 ? T.bg2 : T.bg, color: histPg === 0 ? T.border3 : T.text3, fontSize: 12, cursor: histPg === 0 ? "default" : "pointer", fontWeight: 500 }}>
                  {"\u2190"} Vorige
                </button>
                {Array.from({ length: Math.min(histTotPg, 9) }, (_, i) => {
                  let p2;
                  if (histTotPg <= 9) p2 = i;
                  else if (histPg < 5) p2 = i;
                  else if (histPg > histTotPg - 6) p2 = histTotPg - 9 + i;
                  else p2 = histPg - 4 + i;
                  return (
                    <button key={p2} onClick={() => setHistPg(p2)}
                      style={{ width: 32, height: 32, borderRadius: 6, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", background: histPg === p2 ? "#22C55E" : "transparent", color: histPg === p2 ? "#fff" : T.text4 }}>
                      {p2 + 1}
                    </button>
                  );
                })}
                <button onClick={() => setHistPg(Math.min(histTotPg - 1, histPg + 1))} disabled={histPg >= histTotPg - 1}
                  style={{ padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.border3}`, background: histPg >= histTotPg - 1 ? T.bg2 : T.bg, color: histPg >= histTotPg - 1 ? T.border3 : T.text3, fontSize: 12, cursor: histPg >= histTotPg - 1 ? "default" : "pointer", fontWeight: 500 }}>
                  Volgende {"\u2192"}

                                          <div style={{ fontSize: 10, color: T.border3, fontStyle: "italic" }}>{"\u2014"}</div>

                                          {(() => {

                                            const done = dep.kolom === "afgewerkt";
                                            return <span style={{ fontSize: 8, padding: "1px 4px", borderRadius: 3, background: done ? "#22C55E18" : "#EF444418", color: done ? "#22C55E" : "#EF4444", fontWeight: 600 }}>{done ? "OK" : "NOK"}</span>;
                                          })()}
                                        </div>
                                      )}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        const actF = detailP.fases.find(f => f.kolom === "uitvoering");
        const tks = [...new Set(detailP.fases.filter(f => f.technieker).map(f => f.technieker))];
        const andere = projecten.filter(p => p.klant === detailP.klant && p.id !== detailP.id);
        const cellStyle = { background: T.bg2, borderRadius: 10, border: `1px solid ${T.border2}`, padding: "14px 16px", overflow: "hidden" };

        return (
          <div role="dialog" aria-label={`Detail ${detailP.klant}`} aria-modal="true" style={{ position: "fixed", inset: 0, background: T.bg, zIndex: 1000, display: "flex", flexDirection: "column", overflow: "hidden" }}>

                <span style={{ fontSize: 16, fontWeight: 700, color: T.text2 }}>{detailP.klant}</span>

{/* ══════ BEZOEKRAPPORT EDITOR ══════ */}
      {tab === "bezoekrapporten" && bewerkRapport && brRapporten[bewerkRapport] && (() => {
        const rap = brRapporten[bewerkRapport];

        const saveToFirebase = async () => {
          if (!window.fbDb || !rap.firebaseId) return;
          try {
            const updatedItemData = { ...(rap.items || {}) };
            Object.entries(rap.types || {}).forEach(([tk, td]) => {
              (td.items || []).forEach(item => {
                const sk = item.key;
                const fullSk = tk + "_" + sk;

                const payload = { ...orig, notes: item.notes || "", _checked: item._checked || false, parking: item.parking || null, phaseType: item.phaseType || null, fixType: item.fixType || null, unitType: item.unitType || null, connType: item.connType || null, mountType: item.mountType || null, locationType: item.locationType || null, location: item.location || null, condensStatus: item.condensStatus || null, elekStatus: item.elekStatus || null, fuelType: item.fuelType || null, replaceType: item.replaceType || null, condensPump: item.condensPump || null, boilerTech: item.boilerTech || null, boilerSize: item.boilerSize || null, panelCount: item.panelCount || null, strings: item.strings || null, mppTrackers: item.mppTrackers || null, storageUrls: item.storageUrls || orig.storageUrls || [] };
                updatedItemData[fullSk] = payload;
                // Also save under shared key for compatibility
                if ((rap.items || {})[sk]) updatedItemData[sk] = payload;
              });

            await window.fbDb.collection("bezoekrapport").doc(rap.firebaseId).update({

        };
        const koppelAanProject = () => {
          // Find matching project by klant name or let user pick
          const match = projecten.find(p => p.klant && rap.klant && p.klant.toLowerCase().includes(rap.klant.toLowerCase().split(" ")[0]));
          const projId = match ? match.id : null;
          const nr = "BR-" + String(Object.values(brRapporten).filter(r => r.dossierNr).length + 1).padStart(4, "0");
          updateRap(r => ({ ...r, dossierNr: nr, gekoppeld: true, projectId: projId }));
